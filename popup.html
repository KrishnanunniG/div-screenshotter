<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 240px;
    font: 400 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #1a1a1a;
    background: #fff;
    padding: 16px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .logo svg { flex-shrink: 0; }
  .logo-text { font-size: 14px; font-weight: 600; color: #111; }
  .logo-sub  { font-size: 11px; color: #888; }
  button {
    width: 100%;
    padding: 9px 14px;
    background: #4A9EFF;
    color: #fff;
    border: none;
    border-radius: 8px;
    font: 500 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #2d87f5; }
  .shortcut {
    margin-top: 12px;
    text-align: center;
    font-size: 11px;
    color: #aaa;
  }
  kbd {
    display: inline-block;
    padding: 2px 5px;
    font: 500 10px/1.4 monospace;
    color: #555;
    background: #f0f0f0;
    border: 1px solid #d0d0d0;
    border-radius: 4px;
  }
  .hint {
    margin-top: 10px;
    font-size: 11px;
    color: #999;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="logo">
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="28" height="28" rx="7" fill="#4A9EFF"/>
    <rect x="6" y="6" width="16" height="12" rx="2" stroke="white" stroke-width="1.5" fill="none"/>
    <path d="M10 22 L14 18 L18 22" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="20" cy="20" r="4" fill="#4A9EFF" stroke="white" stroke-width="1.5"/>
    <path d="M18.5 20 L20 21.5 L21.5 19" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <div>
    <div class="logo-text">Element Screenshot</div>
    <div class="logo-sub">Pick any element to capture</div>
  </div>
</div>

<button id="btn">Activate Picker</button>

<div class="shortcut">
  or press <kbd>Ctrl</kbd> <kbd>Shift</kbd> <kbd>X</kbd>
</div>

<p class="hint">Hover over any element to highlight it, then click to download a cropped screenshot.</p>

<script>
document.getElementById("btn").addEventListener("click", () => {
  chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
    chrome.tabs.sendMessage(tabs[0].id, { action: "activate" });
    window.close();
  });
});
</script>
</body>
</html>
